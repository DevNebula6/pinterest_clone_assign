name: pinterest_clone_assign
description: "A Pinterest clone built with Flutter for intern assignment."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Networking
  dio: ^5.4.3+1

  # Image Caching
  cached_network_image: ^3.3.1

  # Loading Effects
  shimmer: ^3.0.0

  # Grid Layout
  flutter_staggered_grid_view: ^0.7.0

  # Authentication
  clerk_flutter: 0.0.14-beta
  clerk_auth: 0.0.14-beta

  # Utilities
  json_annotation: ^4.8.1
  equatable: ^2.0.5
  dartz: ^0.10.1
  flutter_svg: ^2.0.10+1
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.3
  uuid: ^4.4.0
  url_launcher: ^6.2.5
  share_plus: ^9.0.0
  image_picker: ^1.0.7
  path_provider: ^2.1.3
  flutter_animate: ^4.5.0
  haptic_feedback: ^0.5.1+1
  cupertino_icons: ^1.0.8
  flutter_dotenv: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.7.1
  riverpod_generator: ^2.4.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - .env
